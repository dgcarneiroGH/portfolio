<button
  class="more-info"
  [style.--btn-color]="cssColor()"
  [class.disabled]="disabled()"
  [disabled]="disabled()"
  (click)="onClick()"
  (keydown)="onKeyDown($event)"
  [attr.aria-label]="ariaLabel() || text()"
  [attr.aria-describedby]="ariaDescribedBy()"
  type="button"
>
  <span>{{ text() }}</span>
</button>

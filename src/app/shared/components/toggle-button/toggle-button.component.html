<div class="toggle-container" [class.filter-mode]="filterMode()">
  <div class="toggle">
    <label class="toggle-btn">
      <input
        type="checkbox"
        [checked]="isChecked()"
        (change)="toggle($any($event.target).checked)"
        [attr.aria-labelledby]="label() ? 'toggle-label-' + label() : null"
        [attr.aria-label]="label() ? null : 'Toggle'"
      />
      <div class="slider" aria-hidden="true"></div>
    </label>
  </div>
  @if (label()) {
    <div class="label" [id]="'toggle-label-' + label()">
      {{ label() | translate }}
    </div>
  }
</div>

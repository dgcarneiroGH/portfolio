<section class="slider-slide">
  <div class="section-container">
    <h1
      [appAnimate]="animationDelay()"
      [translationKey]="'CONTACT.NOW_WE_KNOW'"
    ></h1>
    <div
      class="nomacoda-animation-wrapper"
      role="button"
      tabindex="0"
      (keydown.enter)="navigate()"
      (keydown.space)="navigate()"
      [attr.aria-label]="'CONTACT.GO_TO_REVIEWS' | translate"
      (click)="navigate()"
    >
      <img
        src="assets/images/nomacoda/nomacoda_climber1.avif"
        class="img-base"
        alt=""
        aria-hidden="true"
      />
      <img
        src="assets/images/nomacoda/nomacoda_climber2.avif"
        class="img-hover"
        alt=""
        aria-hidden="true"
      />
    </div>

    <p [appAnimate]="animationDelay()" [translationKey]="'CONTACT.TALK'"></p>

    <app-contact-form></app-contact-form>
  </div>
</section>
<app-oscillator style="bottom: 0"></app-oscillator>

<article class="post-card">
  <div
    class="post-card__bg"
    [style.background-image]="bgUrl ? 'url(' + bgUrl + ')' : 'none'"
  ></div>
  <div class="post-card__overlay"></div>

  <div class="post-card__content">
    <header class="post-card-header">
      <div class="post-card-header__meta">
        @if (categoryLabel) {
          <div class="category-badge">
            <span class="category-badge__line"></span>
            <span class="category-badge__text">{{
              categoryLabel | translate
            }}</span>
          </div>
        }
        <p class="post-card-header__date">
          {{ date | date: "longDate" : "" : currentLocale }}
        </p>
      </div>
      <h2 class="post-card-header__title">{{ title }}</h2>
    </header>

    <p class="excerpt">{{ excerpt }}</p>

    <footer class="post-footer">
      <app-button
        color="#ffa726"
        [text]="'BLOG.FULL_POST' | translate"
        (buttonClick)="navigateToPostDetail()"
        [attr.aria-label]="'BLOG.FULL_POST_ARIA' | translate"
      ></app-button>
    </footer>
  </div>
</article>

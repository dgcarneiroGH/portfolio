[build]
  command = "npm ci && npm run build:prod"
  publish = "dist/portfolio/browser"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_SKIP_ANGULAR_RUNTIME = "true"

# Configuración para las funciones serverless
[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false